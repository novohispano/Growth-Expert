    <header class="site-header">
      <a class="brand" href="/" aria-label="Growth Expert home">
        <span class="brand__mark">G</span>
        <span class="brand__text"><strong>Growth Expert</strong></span>
      </a>
      <nav class="site-nav" aria-label="Primary">

          <summary>
            <span data-i18n="nav.programs">Programs</span>
            <svg class="nav-caret" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>

          <ul class="nav-menu" role="menu">
