<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="60" y1="40" x2="1140" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F8FA"/>
      <stop offset="1" stop-color="#E8EDF1"/>
    </linearGradient>
    <linearGradient id="panel" x1="90" y1="60" x2="1100" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".96"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity=".84"/>
    </linearGradient>
    <linearGradient id="button" x1="120" y1="450" x2="520" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF4D3D"/>
      <stop offset="1" stop-color="#D92F21"/>
    </linearGradient>
    <filter id="shadow" x="40" y="40" width="1120" height="560" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0D1726" flood-opacity=".12"/>
    </filter>
    <clipPath id="photoClip">
      <rect x="786" y="90" width="284" height="450" rx="28"/>
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="130" cy="86" r="200" fill="#FF4D3D" fill-opacity=".08"/>
  <circle cx="1086" cy="96" r="170" fill="#0D1726" fill-opacity=".04"/>

  <g filter="url(#shadow)">
    <rect x="70" y="54" width="1060" height="522" rx="36" fill="url(#panel)"/>
  </g>
  <rect x="70" y="54" width="1060" height="522" rx="36" stroke="#D8DEE5" stroke-width="2"/>

  <rect x="120" y="96" width="74" height="74" rx="37" fill="#FF4D3D"/>
  <rect x="120" y="96" width="74" height="74" rx="37" stroke="#121212" stroke-width="5"/>
  <text x="157" y="147" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#121212">G</text>

  <text x="220" y="144" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing=".2" fill="#0D1726">Growth Expert</text>
  <text x="120" y="292" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="82" font-weight="700" letter-spacing="-3" fill="#0D1726">Revenue Unlock</text>
  <text x="120" y="368" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="82" font-weight="700" letter-spacing="-3" fill="#0D1726">Program</text>

  <rect x="120" y="430" width="390" height="82" rx="41" fill="url(#button)"/>
  <text x="315" y="482" text-anchor="middle" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#FFFFFF">Start Now</text>

  <rect x="786" y="90" width="284" height="450" rx="28" fill="#FFFFFF"/>
  <g clip-path="url(#photoClip)">
    <image href="./images/jorge_tellez.jpg" x="786" y="90" width="284" height="450" preserveAspectRatio="xMidYMid slice"/>
  </g>
</svg>
