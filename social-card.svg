<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <clipPath id="portraitClip">
      <rect x="800" y="120" width="336" height="420"/>
    </clipPath>
  </defs>

  <!-- White ground -->
  <rect width="1200" height="630" fill="#ffffff"/>

  <!-- Top: brand mark + wordmark -->
  <circle cx="88" cy="88" r="24" fill="#e5382c"/>
  <text x="88" y="100" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="700" fill="#121212">G</text>
  <text x="128" y="97"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="700" letter-spacing="-0.3" fill="#0d1726">Growth Expert</text>

  <!-- Horizontal hairline below brand row -->
  <line x1="64" y1="136" x2="1136" y2="136"
        stroke="#0d1726" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Left column: H1 + lede + CTA -->
  <text x="64" y="248"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="78" font-weight="700" letter-spacing="-3" fill="#0d1726">Your sales motion</text>
  <text x="64" y="328"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="78" font-weight="700" letter-spacing="-3" fill="#0d1726">is leaking revenue.</text>

  <text x="64" y="388"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400" fill="#0d1726">Weekly work on the one fix moving revenue —</text>
  <text x="64" y="418"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400" fill="#0d1726">pricing, close, or expansion — measured this month.</text>

  <!-- Primary CTA: flat red, 2px corners -->
  <rect x="64" y="470" width="270" height="56" rx="2" fill="#e5382c"/>
  <text x="199" y="506" text-anchor="middle"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="20" font-weight="700" fill="#ffffff">Send your numbers</text>

  <!-- Vertical hairline between content and portrait -->
  <line x1="770" y1="160" x2="770" y2="566"
        stroke="#0d1726" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Jorge portrait: sharp rectangle, no radius -->
  <g clip-path="url(#portraitClip)">
    <image href="./images/jorge_tellez.jpg"
           x="800" y="120" width="336" height="420"
           preserveAspectRatio="xMidYMid slice"/>
  </g>
</svg>
